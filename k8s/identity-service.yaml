apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: holiday-platform
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: holiday-planner/identity-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: identity_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
            - name: BOOKING_SERVICE_URL
              value: http://booking-service:8082
