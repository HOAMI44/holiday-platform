apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: holiday-platform
spec:
  selector:
    app: payment-service
  ports:
    - port: 8085
      targetPort: 8085
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: holiday-planner/payment-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: payment_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
          livenessProbe:
            httpGet:
              path: /api/payments/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/payments/health
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
