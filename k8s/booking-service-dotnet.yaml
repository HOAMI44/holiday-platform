apiVersion: v1
kind: Service
metadata:
  name: booking-service-dotnet
  namespace: holiday-platform
spec:
  selector:
    app: booking-service-dotnet
  ports:
    - port: 8082
      targetPort: 8082
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service-dotnet
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service-dotnet
  template:
    metadata:
      labels:
        app: booking-service-dotnet
    spec:
      containers:
        - name: booking-service-dotnet
          image: holiday-planner/booking-service-dotnet:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Kafka__BootstrapServers
              value: kafka:29092
            - name: ConnectionStrings__DefaultConnection
              value: "Server=postgres;Port=5432;Database=booking_db;User Id=postgres;Password=postgres;"
            - name: Services__EventService__Url
              value: http://event-service:8081
            - name: Services__IdentityService__Url
              value: http://identity-service:8083
            - name: Jwt__Secret
              value: holidayplanner-local-test-secret
          livenessProbe:
            httpGet:
              path: /api/bookings/health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/bookings/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
