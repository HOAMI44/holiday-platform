apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: holiday-platform
spec:
  selector:
    app: notification-service
  ports:
    - port: 8089
      targetPort: 8089
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: holiday-planner/notification-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
          livenessProbe:
            httpGet:
              path: /api/notifications/health
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/notifications/health
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
