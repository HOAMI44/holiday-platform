apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: holiday-platform
spec:
  selector:
    app: booking-service
  ports:
    - port: 8082
      targetPort: 8082
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: holiday-planner/booking-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: booking_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: SERVICES_EVENT_SERVICE_URL
              value: http://event-service:8081
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service:8083
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
