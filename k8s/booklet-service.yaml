apiVersion: v1
kind: Service
metadata:
  name: booklet-service
  namespace: holiday-platform
spec:
  selector:
    app: booklet-service
  ports:
    - port: 8087
      targetPort: 8087
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booklet-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booklet-service
  template:
    metadata:
      labels:
        app: booklet-service
    spec:
      containers:
        - name: booklet-service
          image: holiday-planner/booklet-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8087
          env:
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
            - name: SERVICES_ORGANIZATION_SERVICE_URL
              value: http://organization-service:8084
            - name: SERVICES_EVENT_SERVICE_URL
              value: http://event-service:8081
          livenessProbe:
            httpGet:
              path: /api/booklets/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/booklets/health
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
