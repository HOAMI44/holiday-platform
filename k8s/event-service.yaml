apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: holiday-platform
spec:
  selector:
    app: event-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: holiday-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: holiday-planner/event-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: event_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: JWT_SECRET
              value: holidayplanner-local-test-secret
            - name: SERVICE_SECRET
              value: holidayplanner-local-service-secret
            - name: BOOKING_SERVICE_URL
              value: http://booking-service-dotnet:8082
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service:8083
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8089
          livenessProbe:
            httpGet:
              path: /api/events/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/events/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
